<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AXY Network</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>AXY NETWORK</h1>
    <p>Server Hub & Control System</p>
  </div>

  <div class="grid">

    <div class="card war">
      <h2>War SMP</h2>
      <p>Declare wars, alliances, and battles.</p>
      <button onclick="openServer('war')">Open</button>
    </div>

    <div class="card lifesteal">
      <h2>LifeSteal Realm</h2>
      <p>Steal hearts when killing players.</p>
      <button onclick="openServer('lifesteal')">Open</button>
    </div>

    <div class="card anarchy">
      <h2>Anarchy Zone</h2>
      <p>No rules. Pure chaos.</p>
      <button onclick="openServer('anarchy')">Open</button>
    </div>

    <div class="card peaceful">
      <h2>Peaceful Valley</h2>
      <p>No PvP. Build safely.</p>
      <button onclick="openServer('peaceful')">Open</button>
    </div>

    <div class="card template">
      <h2>Template Server</h2>
      <p>Create your own server.</p>
      <button onclick="openServer('template')">Open</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
